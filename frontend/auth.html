<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authenticate - CareerPilot AI</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header>
    <div class="nav-container">
      <a href="index.html" class="logo-wrapper">
        <div class="logo-icon">C</div>
        <span class="logo-text">CareerPilot AI</span>
      </a>
      <a href="index.html" class="nav-link">Back to Home</a>
    </div>
  </header>

  <main style="display: flex; align-items: center; justify-content: center; min-height: 75vh;">
    <div class="glass p-8" style="width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 1.5rem;">
      <div style="text-align: center; display: flex; flex-direction: column; gap: 0.25rem;">
        <h2 id="auth-title" style="font-size: 1.75rem;">Sign In</h2>
        <p id="auth-desc" style="font-size: 0.85rem;">Manage your agents and track progress</p>
      </div>

      <div id="auth-error-alert" class="glass" style="display: none; padding: 0.75rem; border-color: rgba(239,68,68,0.2); background: rgba(239,68,68,0.05); color: #f87171; font-size: 12px; border-radius: 6px;"></div>

      <form id="auth-form" style="display: flex; flex-direction: column; gap: 1rem;">
        <div id="name-form-group" class="form-group" style="display: none;">
          <label for="auth-name">Full Name</label>
          <input type="text" id="auth-name" placeholder="Alex Mercer">
        </div>

        <div class="form-group">
          <label for="auth-email">Email Address</label>
          <input type="email" id="auth-email" required placeholder="you@example.com">
        </div>

        <div class="form-group">
          <label for="auth-password">Password</label>
          <input type="password" id="auth-password" required placeholder="••••••••">
        </div>

        <button type="submit" id="auth-submit-btn" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem; padding: 0.75rem;">
          Sign In
        </button>
      </form>

      <div style="text-align: center; font-size: 13px;">
        <a href="#" id="toggle-auth-mode" style="color: var(--primary); text-decoration: none; font-weight: 600;">
          Need an account? Sign Up
        </a>
      </div>
    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
