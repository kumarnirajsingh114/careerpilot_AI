<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Application Pipeline - CareerPilot AI</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header>
    <div class="nav-container">
      <a href="index.html" class="logo-wrapper">
        <div class="logo-icon">C</div>
        <span class="logo-text">CareerPilot AI</span>
      </a>
      
      <nav class="flex gap-2">
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="resume.html" class="nav-link">Resume Studio</a>
        <a href="interview.html" class="nav-link">Interview Arena</a>
        <a href="career.html" class="nav-link">Path Planner</a>
        <a href="applications.html" class="nav-link" style="color: #fff; background: rgba(255,255,255,0.05);">Kanban Tracker</a>
      </nav>

      <div class="nav-buttons">
        <a href="#" id="logout-btn" class="btn btn-secondary">Log Out</a>
      </div>
    </div>
  </header>

  <main id="kanban-section" style="display: flex; flex-direction: column; gap: 2rem;">
    <!-- Header control buttons -->
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
      <div>
        <h1 style="font-size: 2rem;">Application Pipeline Tracker</h1>
        <p style="font-size: 0.9rem;">Track interview stages and job applications progress cards.</p>
      </div>
    </div>

    <!-- Error notice -->
    <div id="kanban-error-alert" class="glass" style="display: none; padding: 1rem; border-color: rgba(239,68,68,0.2); background: rgba(239,68,68,0.05); color: #f87171; border-radius: 8px;"></div>

    <!-- 1. Add Application widget form -->
    <div class="glass p-6">
      <h3 style="font-size: 1.1rem; margin-bottom: 1rem;">Track New Application</h3>
      <form id="kanban-add-form" style="display: grid; grid-template-cols: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; align-items: end;">
        <div class="form-group">
          <label for="kanban-job-title">Job Title</label>
          <input type="text" id="kanban-job-title" required placeholder="Python Developer">
        </div>
        <div class="form-group">
          <label for="kanban-company">Company</label>
          <input type="text" id="kanban-company" required placeholder="Google">
        </div>
        <div class="form-group">
          <label for="kanban-salary">Salary Range (Optional)</label>
          <input type="text" id="kanban-salary" placeholder="$90k - $120k">
        </div>
        <div class="form-group">
          <label for="kanban-status">Pipeline Stage</label>
          <select id="kanban-status" required>
            <option value="Applied">Applied</option>
            <option value="Interviewing">Interviewing</option>
            <option value="Offer">Offer</option>
            <option value="Rejected">Rejected</option>
          </select>
        </div>
        <button type="submit" id="kanban-add-btn" class="btn btn-primary" style="height: 2.75rem; padding: 0.625rem 1.25rem;">
          Track Card
        </button>
      </form>
    </div>

    <!-- 2. Kanban Columns Board Grid -->
    <div class="kanban-grid">
      <!-- Column Applied -->
      <div class="kanban-column">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 0.5rem;">
          <span style="font-weight: 750; font-size: 13px; color: #fff;">Applied</span>
          <span id="count-applied" style="font-size: 10px; font-weight: 700; color: #9ca3af; padding: 2px 6px; background: rgba(255,255,255,0.05); border-radius: 4px;">0</span>
        </div>
        <div id="col-applied" style="display: flex; flex-direction: column; gap: 0.75rem; flex: 1;"></div>
      </div>

      <!-- Column Interviewing -->
      <div class="kanban-column">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 0.5rem;">
          <span style="font-weight: 750; font-size: 13px; color: #fff;">Interviewing</span>
          <span id="count-interviewing" style="font-size: 10px; font-weight: 700; color: #9ca3af; padding: 2px 6px; background: rgba(255,255,255,0.05); border-radius: 4px;">0</span>
        </div>
        <div id="col-interviewing" style="display: flex; flex-direction: column; gap: 0.75rem; flex: 1;"></div>
      </div>

      <!-- Column Offer -->
      <div class="kanban-column">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 0.5rem;">
          <span style="font-weight: 750; font-size: 13px; color: #fff;">Offer</span>
          <span id="count-offer" style="font-size: 10px; font-weight: 700; color: #9ca3af; padding: 2px 6px; background: rgba(255,255,255,0.05); border-radius: 4px;">0</span>
        </div>
        <div id="col-offer" style="display: flex; flex-direction: column; gap: 0.75rem; flex: 1;"></div>
      </div>

      <!-- Column Rejected -->
      <div class="kanban-column">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 0.5rem;">
          <span style="font-weight: 750; font-size: 13px; color: #fff;">Rejected</span>
          <span id="count-rejected" style="font-size: 10px; font-weight: 700; color: #9ca3af; padding: 2px 6px; background: rgba(255,255,255,0.05); border-radius: 4px;">0</span>
        </div>
        <div id="col-rejected" style="display: flex; flex-direction: column; gap: 0.75rem; flex: 1;"></div>
      </div>
    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
